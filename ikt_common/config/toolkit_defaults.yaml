# =============================================================================
# inverse_kinematics_toolkit -- packaged DEFAULT configuration.
#
# This is the toolkit's own built-in config, shipped INSIDE the submodule
# (ikt_common/config/toolkit_defaults.yaml). It centralises the default
# values -- ports, topics, frames, safety limits -- that would otherwise be
# hard-coded in each package's launch file, so there is ONE place to read
# and edit them.
#
# Config resolution order (ikt_common.config_manager.ConfigManager picks the
# FIRST source that exists):
#   1. A user-specified file: the ROBOT_CONFIG_PATH environment variable.
#   2. The consuming workspace's config/robot_config.yaml (or, failing that,
#      config/robot_config.example.yaml).
#   3. THIS file -- the toolkit's packaged default.
# If even this file cannot be read (e.g. ikt_common is not built yet), each
# launch file falls back to the hard-coded `_FALLBACKS` dict it carries as a
# last resort.
#
# To customise for YOUR robot, do NOT edit this file. Instead either:
#   * copy the sections you need into <workspace>/config/robot_config.yaml
#     (wins via step 2), or
#   * point ROBOT_CONFIG_PATH at your own file (wins via step 1).
#
# Top-level keys are package names; second-level keys map 1-to-1 to each
# package launch file's arguments (so `key: value` here == `key:=value` on
# the `ros2 launch` command line).
# =============================================================================
version: 1

# -----------------------------------------------------------------------------
# ikt_inverse_kinematics -- advisory IK solver (+ optional dashboard).
# ROBOT-INDEPENDENT: the node builds its model from the live /robot_description;
# nothing here names a robot. The link to solve is chosen at runtime / per
# request, NOT here. Solver tuning lives in the package's ik_defaults.yaml.
# -----------------------------------------------------------------------------
ikt_inverse_kinematics:
  robot_description_topic: "/robot_description"
  joint_states_topic: "/joint_states"
  base_frame: ""                  # "" = use the URDF root as the solve frame
  host: "0.0.0.0"
  dashboard_port: 8160

# -----------------------------------------------------------------------------
# ikt_pose_commander -- target pose -> IK -> robot motion (safety-gated).
# ROBOT-INDEPENDENT: only robot-neutral defaults here. The link to control and
# its joints/controllers are chosen at RUNTIME (dashboard or ~/configure) and
# auto-derived from the URDF + /controller_manager -- never named here.
# -----------------------------------------------------------------------------
ikt_pose_commander:
  robot_description_topic: "/robot_description"
  joint_states_topic: "/joint_states"
  base_frame: ""                  # "" = use the URDF root as the solve frame
  command_mode: "jtc"             # "jtc" (safe, discrete) | "fpc" (streaming)
  start_enabled: false            # SAFETY: stay disabled until ~/enable
  switch_controllers: true
  controller_manager: "/controller_manager"
  # safety gates
  max_joint_speed: 0.5            # rad/s -- caps JTC move speed
  min_move_time: 0.5              # s
  max_step_rad: 0.8               # reject a solve that jumps any joint > this
  joint_states_stale_after: 0.5   # s
  status_rate_hz: 10.0
  # dashboard ("" on the commander launch = headless; the dashboard launch
  # defaults its own port to this value)
  host: "0.0.0.0"
  dashboard_port: 8180
  dashboard_base_frame: "base_link"   # concrete TF frame for capture/jog
